name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproducer
    attributes:
      label: Minimal reproducer
      description: A test method or code snippet that demonstrates the issue.
      render: java

  - type: input
    id: java-version
    attributes:
      label: Java version
      placeholder: "e.g. 21.0.3 (output of `java -version`)"
    validations:
      required: true

  - type: input
    id: spring-version
    attributes:
      label: Spring Boot version (if applicable)
      placeholder: "e.g. 3.3.0"

  - type: input
    id: library-version
    attributes:
      label: relay-java version
      placeholder: "e.g. 0.1.0"
    validations:
      required: true
